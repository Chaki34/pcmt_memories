<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Gallery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #0D0B61;
            --accent-red: #ff4d4f;
            --lightbox-bg: rgba(13, 11, 97, 0.98);
            --text-main: #ffffff;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--brand-blue);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* HEADER SECTION */
        .page-header {
            text-align: center;
            padding: 80px 20px 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        /* MUSIC FLOATING BUTTON */
        .music-toggle-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1050;
            background: var(--accent-red);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .music-toggle-btn:hover { transform: scale(1.1); background: white; color: var(--brand-blue); }

        /* GALLERY GRID */
        .gallery-item {
            position: relative;
            display: block;
            border-radius: 20px;
            overflow: hidden;
            background: var(--card-bg);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .gallery-item:hover { transform: scale(1.03) translateY(-10px); border-color: var(--accent-red); }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13, 11, 97, 0.9) 0%, transparent 70%);
            opacity: 0;
            transition: 0.3s ease;
        }

        .gallery-item:hover .img-overlay { opacity: 1; }

        .img-actions {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.4s;
        }

        .gallery-item:hover .img-actions { opacity: 1; transform: translateY(0); }

        /* LIGHTBOX & CAROUSEL (Existing functionalities preserved) */
        .lightbox-modal .modal-content { background: var(--lightbox-bg); border: none; }
        .carousel-item { height: 100vh; display: flex !important; align-items: center; justify-content: center; padding-bottom: 80px; }
        .carousel-item img { max-height: 85vh; max-width: 90vw; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* RED BOLD CAPTION */
        .carousel-caption {
            bottom: 40px;
            background: white;
            border-radius: 50px;
            padding: 10px 35px;
            width: auto;
            left: 50%;
            transform: translateX(-50%);
        }
        .carousel-caption h5 { color: var(--accent-red) !important; font-weight: 900; margin: 0; text-transform: uppercase; font-size: 1.2rem; }

        /* RED BOLD ARROWS */
        .carousel-control-prev-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23ff4d4f'%3e%3cpath fill-rule='evenodd' d='M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z'/%3e%3c/svg%3e") !important;
        }
        .carousel-control-next-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23ff4d4f'%3e%3cpath fill-rule='evenodd' d='M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e") !important;
        }
        .carousel-control-prev-icon, .carousel-control-next-icon { width: 5rem; height: 5rem; filter: drop-shadow(0 0 5px rgba(255,0,0,0.4)); }

        /* MUSIC MODAL STYLING */
        #musicModal .modal-content { background: white; color: var(--brand-blue); border-radius: 20px; }
        .music-option { padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .music-option:hover { background: #f0f4ff; border-color: var(--brand-blue); }
        .music-option.active { background: var(--brand-blue); color: white; }

        .btn-close-white { filter: invert(1); }
    </style>
</head>
<body>


<audio id="main-audio" loop style="display:none;"></audio>

<!-- MUSIC TOGGLE BUTTON -->
<button class="music-toggle-btn" data-bs-toggle="modal" data-bs-target="#musicModal" title="Music Settings">
    <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
        <path d="M6 13c0 1.105-1.12 2-2.5 2S1 14.105 1 13c0-1.104 1.12-2 2.5-2s2.5.896 2.5 2zm9-2c0 1.105-1.12 2-2.5 2s-2.5-.895-2.5-2c0-1.104 1.12-2 2.5-2s2.5.896 2.5 2z"/>
        <path fill-rule="evenodd" d="M14 11V2h1v9h-1zM6 3l9-1v1H6V3z"/>
        <path d="M5 2.905a1 1 0 0 1 .9-.995l8-.889A1 1 0 0 1 15 2v13h-1V2.96l-7 .777V13H6V2.905z"/>
    </svg>
</button>

<!-- HEADER -->
<div class="page-header">
    <h1>Alumni Gallery</h1>
    <p class="opacity-75">Capturing memories, celebrating our journey.</p>
</div>

<!-- GALLERY GRID -->
<div class="container pb-5">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-5 gallery-grid">
        <div class="col" th:each="alumnus : ${alumni}">
            <div class="gallery-item"
                 th:attr="
        data-full=${alumnus.fullImageUrl},
        data-type=${alumnus.type}">

                <!-- IMAGE -->
                <img th:if="${alumnus.type == 'image'}"
                     th:src="${alumnus.thumbnailUrl}"
                     alt="Memory"
                     referrerpolicy="no-referrer">

                <!-- VIDEO (Changed to use Thumbnail to avoid 429 Errors) -->
                <div th:if="${alumnus.type == 'video'}"
                     class="position-relative overflow-hidden rounded-4"
                     style="height:300px; background:#000; cursor:pointer;">

                    <!-- VIDEO THUMBNAIL (STATIC IMAGE) -->
                    <img th:src="${alumnus.thumbnailUrl}"
                         style="width:100%; height:100%; object-fit:cover; opacity: 0.7;"
                         referrerpolicy="no-referrer">

                    <!-- DARK OVERLAY -->
                    <div style="position:absolute; inset:0; background:rgba(0,0,0,0.2);"></div>

                    <!-- PLAY ICON -->
                    <div class="video-play-icon"
                         style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
                                width:90px; height:90px; border-radius:50%; background:rgba(255,255,255,0.15);
                                backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center;
                                font-size:42px; color:white; box-shadow:0 0 25px rgba(0,0,0,0.4);">
                        ▶
                    </div>

                    <!-- VIDEO LABEL -->
                    <div style="position:absolute; bottom:15px; left:15px; background:rgba(0,0,0,0.7);
                                color:white; padding:6px 14px; border-radius:30px; font-size:13px; font-weight:700;">
                        VIDEO
                    </div>
                </div>

                <div class="img-overlay"></div>
                <div class="img-actions">
                    <button class="btn btn-danger btn-sm rounded-pill px-3 fw-bold">⛶ VIEW</button>
                    <a th:href="${alumnus.fullImageUrl}" class="btn btn-light btn-sm rounded-circle" download target="_blank">⬇</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MUSIC MODAL -->
<div class="modal fade" id="musicModal" tabindex="-1" aria-labelledby="musicModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold" id="musicModalLabel">🎵 Background Music</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3">Select any music from your music folder.</p>
                <div class="alert alert-dark py-2 mb-3">
                    <strong>Now Playing:</strong> <span id="current-track">No music selected</span>
                </div>
                <div class="music-option" onclick="selectMusic('/musics/woh-din.mp3', 'Woh Din', this)">
                    <div class="d-flex justify-content-between align-items-center">
                        <span>🎵 Woh Din</span> <small>Track 01</small>
                    </div>
                </div>
                <div class="music-option" onclick="selectMusic('/musics/Bondhu-Chol.mp3', 'Bondhu-Chol', this)">
                    <div class="d-flex justify-content-between align-items-center">
                        <span>🎸 Acoustic Memories</span> <small>Track 02</small>
                    </div>
                </div>
                <div class="music-option" onclick="selectMusic('/musics/Ronald_Meirs_-_Memories_Bring_Back_Memories_(mp3.pm).mp3', 'Memories Bring Back Memories', this)">
                    <div class="d-flex justify-content-between align-items-center">
                        <span>🎹 Emotional Piano</span> <small>Track 03</small>
                    </div>
                </div>
                <div class="mt-4 pt-3 border-top d-flex gap-2">
                    <button class="btn btn-dark flex-grow-1" onclick="pauseMusic()">⏸ Pause</button>
                    <button class="btn btn-danger flex-grow-1" onclick="resumeMusic()">▶ Resume</button>
                    <button class="btn btn-primary flex-grow-1" onclick="restartMusic()">🔁 Restart</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- LIGHTBOX MODAL -->
<div class="modal fade lightbox-modal" id="lightbox-modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen modal-dialog-centered">
        <div class="modal-content">
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" style="position:absolute; top:20px; right:20px; z-index:9999;"></button>
            <div class="modal-body p-0">
                <div id="dynamic-carousel-container"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // LIGHTBOX LOGIC
    document.addEventListener('DOMContentLoaded', () => {
        const galleryItems = document.querySelectorAll('.gallery-item');
        const modalEl = document.getElementById('lightbox-modal');
        const carouselContainer = document.getElementById('dynamic-carousel-container');
        const bsModal = new bootstrap.Modal(modalEl);

        const buildCarousel = (activeIndex) => {
            let slides = '';
            galleryItems.forEach((item, index) => {
                const fullImg = item.getAttribute('data-full');
                const mediaType = item.getAttribute('data-type');
                let mediaContent = '';

                if(mediaType === 'video') {
                    let videoUrl = fullImg;
                    if(videoUrl.includes('drive.google.com') && !videoUrl.endsWith('/preview')) {
                        videoUrl = videoUrl.replace(/\/view.*$/, '/preview');
                    }
                    mediaContent = `
                        <div class="ratio ratio-16x9 mx-auto" style="max-width:85vw; max-height:80vh;">
                            <iframe src="${videoUrl}" allow="autoplay" allowfullscreen style="border:none; border-radius:20px;"></iframe>
                        </div>`;
                } else {
                    // FIXED: Added referrerpolicy="no-referrer" to bypass security blocks
                    mediaContent = `<img src="${fullImg}"
                                         referrerpolicy="no-referrer"
                                         alt="Gallery Image"
                                         style="max-height:85vh; max-width:90vw; object-fit:contain; border-radius:12px;">`;
                }

                slides += `
                    <div class="carousel-item ${index === activeIndex ? 'active' : ''}">
                        <div class="d-flex align-items-center justify-content-center w-100 h-100" style="min-height:80vh;">
                            ${mediaContent}
                        </div>
                        <div class="carousel-caption">
                            <h5 style="background: white; color: #ff4d4f; display: inline-block; padding: 5px 20px; border-radius: 50px; font-weight: bold;">
                                Memory ${index + 1} of ${galleryItems.length}
                            </h5>
                        </div>
                    </div>`;
            });

            carouselContainer.innerHTML = `
                <div id="lbCarousel" class="carousel slide carousel-fade" data-bs-interval="false">
                    <div class="carousel-inner">${slides}</div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#lbCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#lbCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    </button>
                </div>`;
        };

        galleryItems.forEach((item, index) => {
            item.addEventListener('click', (e) => {
                if(e.target.tagName === 'A' || e.target.closest('a')) return;
                buildCarousel(index);
                bsModal.show();
            });
        });

        modalEl.addEventListener('hidden.bs.modal', () => {
            carouselContainer.innerHTML = '';
        });
    });

    // MUSIC LOGIC (No changes needed here, preserved as is)
    const audio = document.getElementById('main-audio');
    function selectMusic(src, title, element) {
        document.querySelectorAll('.music-option').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
        audio.pause();
        audio.src = src;
        audio.load();
        audio.play().catch(err => console.error("Playback blocked:", err));
        document.getElementById('current-track').innerText = title;
    }
    function pauseMusic() { audio.pause(); }
    function resumeMusic() { audio.play().catch(e => {}); }
    function restartMusic() { audio.currentTime = 0; audio.play().catch(e => {}); }
</script>
</body>
</html>
